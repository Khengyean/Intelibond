<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;

const SUPA_URL = "https://pdvmybeqxhotvzhkvgfl.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBkdm15YmVxeGhvdHZ6aGt2Z2ZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyODcwNDksImV4cCI6MjA5MDg2MzA0OX0.Fi9pU4WrA3ezaF04_3VtauRA54D466BV2FOmMsRhrSQ";
const sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);

/* ═══════════════════════════════════════════════════════════
   SUPABASE SCHEMA (run once in Supabase SQL editor)
   
   CREATE TABLE IF NOT EXISTS profiles (
     id uuid PRIMARY KEY REFERENCES auth.users ON DELETE CASCADE,
     full_name text, role text, phone text,

   );
   CREATE TABLE IF NOT EXISTS patients (

     assessed_at timestamptz DEFAULT now(),
     frailty_level text, frailty_confidence numeric,
     gait_speed numeric, gait_cadence numeric, gait_stride_length numeric,
     gait_step_width numeric, gait_symmetry numeric, gait_variability numeric,
     mcs_total integer, mcs_scores jsonb,
     clinical_note text
   );
   ALTER TABLE profiles ENABLE ROW LEVEL SECURITY;
   ALTER TABLE patients ENABLE ROW LEVEL SECURITY;
   ALTER TABLE assessments ENABLE ROW LEVEL SECURITY;
   CREATE POLICY "own profile" ON profiles FOR ALL USING (auth.uid()=id);
   CREATE POLICY "own patients" ON patients FOR ALL USING (auth.uid()=caregiver_id);
   CREATE POLICY "own assessments" ON assessments FOR ALL USING (auth.uid()=caregiver_id);
═══════════════════════════════════════════════════════════ */

/* ═══════════════════════════════════════════════════════════
   PDF EXPORT  — client-side via jsPDF
═══════════════════════════════════════════════════════════ */
function generatePDF({ patient, assessment, caregiverName }) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:"mm", format:"a4" });
  const W = 210, M = 18, cw = W - M*2;
  let y = 0;

  // ── helpers ──────────────────────────────────────────────
  const hex2rgb = h => { const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16); return [r,g,b]; };
  const setFill = hex => { const [r,g,b]=hex2rgb(hex); doc.setFillColor(r,g,b); };
  const setDraw = hex => { const [r,g,b]=hex2rgb(hex); doc.setDrawColor(r,g,b); };
  const setTxt  = hex => { const [r,g,b]=hex2rgb(hex); doc.setTextColor(r,g,b); };

  const frailtyColor = lvl => lvl==="Non-frail"?"#0D7A5F":lvl==="Frail"?"#C0392B":"#C97B00";
  const mcsColorHex  = s => s>=14?"#0D7A5F":s>=8?"#C97B00":"#C0392B";
  const scoreColor   = (s,max) => s===max?"#0D7A5F":s===0?"#C0392B":"#C97B00";

  // ── header banner ────────────────────────────────────────
  setFill("#1A6FBF"); doc.rect(0,0,W,28,"F");
  setTxt("#FFFFFF");
  doc.setFont("helvetica","bold"); doc.setFontSize(18);
  doc.text("InteliBond", M, 12);
  doc.setFont("helvetica","normal"); doc.setFontSize(8);
  doc.text("AI-Driven Frailty & Mobility Assessment", M, 18);
  doc.setFont("helvetica","bold"); doc.setFontSize(8);
  doc.text("CLINICAL ASSESSMENT REPORT", W-M, 12, {align:"right"});
  doc.setFont("helvetica","normal"); doc.setFontSize(7);
  const dateStr = new Date(assessment.assessed_at||Date.now()).toLocaleDateString("en-MY",
    {day:"numeric",month:"long",year:"numeric",hour:"2-digit",minute:"2-digit"});
  doc.text(dateStr, W-M, 18, {align:"right"});
  y = 34;

  // ── patient info box ─────────────────────────────────────
  setFill("#F4F8FD"); setDraw("#D0E0EF");
  doc.setLineWidth(0.3); doc.roundedRect(M,y,cw,28,2,2,"FD");
  setTxt("#8BA3BE"); doc.setFont("helvetica","bold"); doc.setFontSize(7);
  doc.text("PATIENT INFORMATION", M+4, y+6);
  setTxt("#12263A"); doc.setFont("helvetica","bold"); doc.setFontSize(11);
  doc.text(patient.full_name||"Unknown", M+4, y+13);
  doc.setFont("helvetica","normal"); doc.setFontSize(8); setTxt("#4A6280");
  const patDetails = [
    patient.dob ? `DOB: ${new Date(patient.dob).toLocaleDateString("en-MY")}` : null,
    patient.gender ? `Gender: ${patient.gender}` : null,
    patient.ic_number ? `IC: ${patient.ic_number}` : null,
    patient.diagnosis ? `Dx: ${patient.diagnosis}` : null,
  ].filter(Boolean).join("   ·   ");
  doc.text(patDetails||"", M+4, y+20);
  doc.setFont("helvetica","normal"); doc.setFontSize(7); setTxt("#8BA3BE");
  doc.text(`Assessed by: ${caregiverName||"Unknown"}`, W-M-4, y+20, {align:"right"});
  y += 34;

  // ── frailty + MCS summary row ────────────────────────────
  const fColor = frailtyColor(assessment.frailty_level||"Pre-frail");
  const mColor = mcsColorHex(assessment.mcs_total??0);
  const half = (cw-6)/2;

  // Frailty box
  setFill("#F8FDFA"); setDraw(fColor);
  doc.setLineWidth(0.5); doc.roundedRect(M,y,half,30,2,2,"FD");
  setTxt("#8BA3BE"); doc.setFont("helvetica","bold"); doc.setFontSize(7);
  doc.text("FRAILTY CLASSIFICATION", M+4, y+7);
  const [fr,fg,fb]=hex2rgb(fColor);
  doc.setTextColor(fr,fg,fb); doc.setFont("helvetica","bold"); doc.setFontSize(18);
  doc.text(assessment.frailty_level||"—", M+4, y+21);
  setTxt("#8BA3BE"); doc.setFont("helvetica","normal"); doc.setFontSize(7);
  doc.text(`Confidence: ${Math.round((assessment.frailty_confidence??0.78)*100)}%`, M+4, y+27);

  // MCS box
  const mx = M+half+6;
  setFill("#F8FDFA"); setDraw(mColor);
  doc.roundedRect(mx,y,half,30,2,2,"FD");
  setTxt("#8BA3BE"); doc.setFont("helvetica","bold"); doc.setFontSize(7);
  doc.text("MOBILITY CAPACITY SCORE", mx+4, y+7);
  const [mr,mg,mb]=hex2rgb(mColor);
  doc.setTextColor(mr,mg,mb); doc.setFont("helvetica","bold"); doc.setFontSize(18);
  doc.text(`${assessment.mcs_total??0}/20`, mx+4, y+21);
  setTxt("#8BA3BE"); doc.setFont("helvetica","normal"); doc.setFontSize(7);
  const mLabel = (assessment.mcs_total??0)>=14?"Good mobility":(assessment.mcs_total??0)>=8?"Moderate impairment":"Significant impairment";
  doc.text(mLabel, mx+4, y+27);
  y += 37;

  // ── gait parameters ──────────────────────────────────────
  if (assessment.gait_speed != null) {
    setTxt("#8BA3BE"); doc.setFont("helvetica","bold"); doc.setFontSize(7);
    doc.text("GAIT PARAMETERS", M, y+5);
    setDraw("#D0E0EF"); doc.setLineWidth(0.3);
    doc.line(M+38, y+2, M+cw, y+2);
    y += 10;
    const gParams = [
      { label:"Gait Speed",    val:`${assessment.gait_speed} m/s`,   lo:0.6, hi:1.3, v:assessment.gait_speed },
      { label:"Cadence",       val:`${assessment.gait_cadence} spm`, lo:75,  hi:115, v:assessment.gait_cadence },
      { label:"Stride Length", val:`${assessment.gait_stride_length} m`, lo:0.7, hi:1.3, v:assessment.gait_stride_length },
      { label:"Step Width",    val:`${assessment.gait_step_width} m`, lo:0.1, hi:0.25, v:assessment.gait_step_width },
      { label:"Symmetry",      val:`${assessment.gait_symmetry}%`,   lo:70,  hi:100, v:assessment.gait_symmetry },
      { label:"Variability",   val:`${assessment.gait_variability}%CV`, lo:0,hi:10,  v:assessment.gait_variability },
    ];
    const gcw = (cw-10)/3;
    gParams.forEach((p,i) => {
      const col = i%3, row = Math.floor(i/3);
      const gx = M + col*(gcw+5), gy = y + row*18;
      setFill("#F4F8FD"); setDraw("#D0E0EF");
      doc.roundedRect(gx,gy,gcw,14,1,1,"FD");
      setTxt("#8BA3BE"); doc.setFont("helvetica","bold"); doc.setFontSize(6.5);
      doc.text(p.label.toUpperCase(), gx+3, gy+5);
      const ok = p.v>=p.lo && p.v<=p.hi;
      const low = p.v<p.lo;
      const c = ok?"#0D7A5F":low?"#C0392B":"#C97B00";
      const [cr,cg,cb]=hex2rgb(c);
      doc.setTextColor(cr,cg,cb); doc.setFont("helvetica","bold"); doc.setFontSize(9);
      doc.text(p.val, gx+3, gy+11);
    });
    y += 42;
  }

  // ── MCS exercise scores ───────────────────────────────────
  setTxt("#8BA3BE"); doc.setFont("helvetica","bold"); doc.setFontSize(7);
  doc.text("MOBILITY CAPACITY SCORE — EXERCISE BREAKDOWN", M, y+5);
  setDraw("#D0E0EF"); doc.setLineWidth(0.3);
  doc.line(M+77, y+2, M+cw, y+2);
  y += 10;

  const MCS_LABELS = [
    {id:"lying_to_sitting",   label:"Lying to Sitting",      max:2},
    {id:"sitting_to_lying",   label:"Sitting to Lying",       max:2},
    {id:"sitting_to_standing",label:"Sitting to Standing",    max:3},
    {id:"standing",           label:"Standing",               max:3},
    {id:"gait",               label:"Gait",                   max:3},
    {id:"timed_walk",         label:"Timed Walk (6m)",        max:3},
    {id:"functional_reach",   label:"Functional Reach",       max:4},
  ];
  const scores = assessment.mcs_scores||{};
  const barW = cw - 60;
  MCS_LABELS.forEach((t,i) => {
    const s = scores[t.id]??null;
    const gy = y + i*10;
    setTxt("#4A6280"); doc.setFont("helvetica","normal"); doc.setFontSize(8);
    doc.text(t.label, M, gy+5);
    // bg bar
    setFill("#EBF3FF"); doc.rect(M+58, gy+1, barW, 5,"F");
    if (s!=null) {
      const pct = s/t.max;
      const c = scoreColor(s,t.max);
      setFill(c); doc.rect(M+58, gy+1, barW*pct, 5,"F");
      const [cr,cg,cb]=hex2rgb(c);
      doc.setTextColor(cr,cg,cb); doc.setFont("helvetica","bold"); doc.setFontSize(7);
      doc.text(`${s}/${t.max}`, M+cw-1, gy+6, {align:"right"});
    } else {
      setTxt("#8BA3BE"); doc.setFont("helvetica","normal"); doc.setFontSize(7);
      doc.text("—", M+cw-1, gy+6, {align:"right"});
    }
  });
  y += 82;

  // ── clinical recommendation ───────────────────────────────
  const rec = (assessment.mcs_total??0)>=14
    ? "Good mobility. Continue monitoring and preventive exercise programme."
    : (assessment.mcs_total??0)>=8
    ? "Moderate mobility impairment. Consider physiotherapy referral and structured exercise programme."
    : "Significant mobility impairment. Urgent geriatric review and multidisciplinary care team assessment recommended.";
  const fhex = frailtyColor(assessment.frailty_level||"Pre-frail");
  const [fr2,fg2,fb2]=hex2rgb(fhex);
  doc.setFillColor(fr2,fg2,fb2); doc.rect(M,y,3,18,"F");
  setFill("#F4F8FD"); setDraw("#D0E0EF"); doc.setLineWidth(0.3);
  doc.roundedRect(M+3,y,cw-3,18,1,1,"FD");
  setTxt("#8BA3BE"); doc.setFont("helvetica","bold"); doc.setFontSize(7);
  doc.text("CLINICAL RECOMMENDATION", M+7, y+6);
  setTxt("#4A6280"); doc.setFont("helvetica","normal"); doc.setFontSize(8);
  const recLines = doc.splitTextToSize(rec, cw-12);
  doc.text(recLines, M+7, y+13);
  y += 26;

  // ── notes ────────────────────────────────────────────────
  if (assessment.clinical_note) {
    setTxt("#8BA3BE"); doc.setFont("helvetica","bold"); doc.setFontSize(7);
    doc.text("CLINICIAN NOTES", M, y+5);
    y += 9;
    setFill("#FFFFF0"); setDraw("#F5D58A"); doc.setLineWidth(0.3);
    const noteLines = doc.splitTextToSize(assessment.clinical_note, cw-8);
    doc.roundedRect(M,y,cw,noteLines.length*4+8,1,1,"FD");
    setTxt("#4A6280"); doc.setFont("helvetica","normal"); doc.setFontSize(8);
    doc.text(noteLines, M+4, y+7);
    y += noteLines.length*4+14;
  }

  // ── footer ───────────────────────────────────────────────
  setFill("#1A6FBF"); doc.rect(0,285,W,12,"F");
  setTxt("#FFFFFF"); doc.setFont("helvetica","normal"); doc.setFontSize(7);
  doc.text("Generated by InteliBond — AI-Driven Frailty Assessment System", M, 292);
  doc.text("For clinical use only. Not a substitute for professional medical judgment.", W-M, 292, {align:"right"});

  const fname = `InteliBond_${(patient.full_name||"Patient").replace(/\s+/g,"_")}_${new Date().toISOString().slice(0,10)}.pdf`;
  doc.save(fname);
}

/* ═══════════════════════════════════════════════════════════
   PATIENT MANAGEMENT HOOK
═══════════════════════════════════════════════════════════ */
function usePatients(caregiverId) {
  const [patients, setPatients] = useState([]);
  const [loading, setLoading]   = useState(false);

  const fetchPatients = useCallback(async () => {
    if (!caregiverId) return;
    setLoading(true);
    const { data } = await sb.from("patients")
      .select("*").eq("caregiver_id", caregiverId)
      .order("created_at", { ascending:false });
    setPatients(data||[]);
    setLoading(false);
  }, [caregiverId]);

  useEffect(() => { fetchPatients(); }, [fetchPatients]);

  const addPatient = async (fields) => {
    // remap form fields to DB columns
    const payload = {
      full_name:    fields.full_name,
      gender:       fields.gender ? fields.gender.toLowerCase() : null,
      date_of_birth: fields.dob || null,
      ic_number:    fields.ic_number || null,
      diagnosis:    fields.diagnosis || null,
      notes:        fields.notes || null,
      caregiver_id: caregiverId,
    };
    const { data, error } = await sb.from("patients")
      .insert(payload)
      .select().single();
    if (error) { console.error("addPatient error:", error); return null; }
    setPatients(p => [data, ...p]);
    return data;
  };

  const deletePatient = async (id) => {
    await sb.from("patients").delete().eq("id", id);
    setPatients(p => p.filter(x => x.id !== id));
  };

  return { patients, loading, fetchPatients, addPatient, deletePatient };
}

/* ═══════════════════════════════════════════════════════════
   ASSESSMENTS HOOK
═══════════════════════════════════════════════════════════ */
function useAssessments(patientId) {
  const [assessments, setAssessments] = useState([]);
  const [loading, setLoading] = useState(false);

  const fetchAssessments = useCallback(async () => {
    if (!patientId) { setAssessments([]); return; }
    setLoading(true);
    const { data } = await sb.from("assessments")
      .select("*").eq("patient_id", patientId)
      .order("assessed_at", { ascending:false });
    setAssessments(data||[]);
    setLoading(false);
  }, [patientId]);

  useEffect(() => { fetchAssessments(); }, [fetchAssessments]);

  const saveAssessment = async (payload) => {
    const { data, error } = await sb.from("assessments")
      .insert(payload).select().single();
    if (!error) { setAssessments(p => [data, ...p]); return data; }
    return null;
  };

  return { assessments, loading, fetchAssessments, saveAssessment };
}

/* ═══════════════════════════════════════════════════════════
   ADD PATIENT MODAL
═══════════════════════════════════════════════════════════ */
function AddPatientModal({ onAdd, onClose }) {
  const [form, setForm] = useState({ full_name:"", dob:"", gender:"", ic_number:"", diagnosis:"", notes:"" });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const set = (k,v) => setForm(p=>({...p,[k]:v}));

  const handleAdd = async () => {
    if (!form.full_name.trim()) { setError("Name is required"); return; }
    setLoading(true); setError("");
    const result = await onAdd(form);
    setLoading(false);
    if (result) onClose();
    else setError("Failed to add patient. Try again.");
  };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(18,38,58,0.55)",zIndex:100,display:"flex",
      alignItems:"flex-end",justifyContent:"center"}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{width:"100%",maxWidth:430,background:"#fff",borderRadius:"22px 22px 0 0",
        padding:"24px 22px 36px",maxHeight:"90vh",overflowY:"auto",animation:"authFadeIn 0.25s ease-out"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div style={{fontSize:17,fontWeight:700,color:"#12263A"}}>Add New Patient</div>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,color:"#8BA3BE",cursor:"pointer",lineHeight:1}}>×</button>
        </div>
        {error && <div style={{background:"#FDECEA",border:"1px solid #F4B8B3",borderRadius:8,padding:"8px 12px",fontSize:12,color:"#C0392B",marginBottom:14}}>{error}</div>}
        {[
          ["full_name","Full Name","Ahmad bin Abdullah","text",true],
          ["ic_number","IC Number","XXXXXX-XX-XXXX","text",false],
          ["dob","Date of Birth","","date",false],
          ["diagnosis","Diagnosis / Condition","e.g. Stroke, Parkinson's","text",false],
          ["notes","Notes","Additional clinical notes","text",false],
        ].map(([k,lbl,ph,type,req])=>(
          <div key={k} style={{marginBottom:12}}>
            <div style={{fontSize:11,fontWeight:600,color:"#4A6280",marginBottom:5}}>{lbl}{req&&<span style={{color:"#C0392B"}}> *</span>}</div>
            <input className="auth-input" type={type} placeholder={ph}
              value={form[k]} onChange={e=>set(k,e.target.value)}/>
          </div>
        ))}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:11,fontWeight:600,color:"#4A6280",marginBottom:5}}>Gender</div>
          <div style={{display:"flex",gap:8}}>
            {["Male","Female","Other"].map(g=>(
              <button key={g} onClick={()=>set("gender",g)}
                className={`role-btn${form.gender===g?" active":""}`}
                style={{fontSize:12,padding:"9px 0"}}>{g}</button>
            ))}
          </div>
        </div>
        <button className="auth-btn" onClick={handleAdd} disabled={loading||!form.full_name.trim()}>
          {loading?"Adding…":"Add Patient"}
        </button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   PATIENT SELECTOR — shown above capture buttons on home
═══════════════════════════════════════════════════════════ */
function PatientSelector({ patients, selected, onSelect, onAdd, onManage }) {
  return (
    <div style={{marginBottom:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>

/* ═══════════════════════════════════════════════════════════
   ASSESSMENT HISTORY SCREEN
═══════════════════════════════════════════════════════════ */
function AssessmentHistoryScreen({ patient, assessments, loading, onBack, onDownloadPDF, caregiverName }) {
  const [expanded, setExpanded] = useState(null);
  const frailtyColor = lvl => lvl==="Non-frail"?"#0D7A5F":lvl==="Frail"?"#C0392B":"#C97B00";
  const frailtyBg   = lvl => lvl==="Non-frail"?"#E6F5F1":lvl==="Frail"?"#FDECEA":"#FFF8E6";
  const frailtyBd   = lvl => lvl==="Non-frail"?"#A8D9CC":lvl==="Frail"?"#F4B8B3":"#F5D58A";
  const mcsC        = s => s>=14?"#0D7A5F":s>=8?"#C97B00":"#C0392B";

  const MCS_LABELS = [
    {id:"lying_to_sitting",    label:"Lying→Sitting",    max:2},
    {id:"sitting_to_lying",    label:"Sitting→Lying",    max:2},
    {id:"sitting_to_standing", label:"Sit→Stand",        max:3},
    {id:"standing",            label:"Standing",          max:3},
    {id:"gait",                label:"Gait",              max:3},
    {id:"timed_walk",          label:"Timed Walk",        max:3},
    {id:"functional_reach",    label:"Reach",             max:4},
  ];

  return (
    <div style={{background:"#EEF4FB",minHeight:"100vh",maxWidth:430,margin:"0 auto",paddingBottom:40}}>
      <div style={{background:"#fff",borderBottom:"1px solid #D0E0EF",padding:"18px 20px 14px",
        display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:"#1A6FBF",fontSize:13,cursor:"pointer",fontWeight:600}}>← Back</button>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:14,fontWeight:700,color:"#12263A"}}>{patient.full_name}</div>
          <div style={{fontSize:10,color:"#8BA3BE"}}>Assessment History</div>
        </div>
        <div style={{width:48}}/>
      </div>

      <div style={{padding:"16px 16px 0"}}>
        {loading ? (
          <div style={{textAlign:"center",padding:40}}>
            <div style={{width:28,height:28,border:"3px solid #D0E0EF",borderTopColor:"#1A6FBF",
              borderRadius:"50%",animation:"spin 0.8s linear infinite",margin:"0 auto"}}/>
          </div>
        ) : assessments.length===0 ? (
          <div style={{textAlign:"center",padding:"50px 20px"}}>
            <div style={{fontSize:36,marginBottom:12}}>📋</div>
            <div style={{fontSize:14,fontWeight:700,color:"#12263A",marginBottom:6}}>No assessments yet</div>
            <div style={{fontSize:12,color:"#8BA3BE"}}>Complete an assessment on the home screen to see it here.</div>
          </div>
        ) : assessments.map((a,i) => {
          const isExp = expanded===a.id;
          const fc = a.frailty_level ? frailtyColor(a.frailty_level) : "#8BA3BE";
          const fb = a.frailty_level ? frailtyBg(a.frailty_level) : "#F4F8FD";
          const fdBd = a.frailty_level ? frailtyBd(a.frailty_level) : "#D0E0EF";
          const mc = mcsC(a.mcs_total??0);
          const scores = a.mcs_scores||{};
          return (
            <div key={a.id} style={{background:"#fff",borderRadius:16,border:"1px solid #D0E0EF",
              marginBottom:10,overflow:"hidden"}}>
              {/* Row header */}
              <div style={{padding:"14px 16px",display:"flex",alignItems:"center",gap:12,
                cursor:"pointer"}} onClick={()=>setExpanded(isExp?null:a.id)}>
                <div style={{width:40,height:40,borderRadius:10,background:fb,
                  border:`1.5px solid ${fdBd}`,display:"flex",flexDirection:"column",
                  alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  <div style={{fontSize:11,fontWeight:800,color:fc,lineHeight:1}}>
                    {a.frailty_level?a.frailty_level.split("-")[0].slice(0,3).toUpperCase():"N/A"}
                  </div>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,fontWeight:700,color:"#12263A"}}>
                    {new Date(a.assessed_at).toLocaleDateString("en-MY",{day:"numeric",month:"short",year:"numeric"})}
                  </div>
                  <div style={{fontSize:10,color:"#8BA3BE",marginTop:2}}>
                    {new Date(a.assessed_at).toLocaleTimeString("en-MY",{hour:"2-digit",minute:"2-digit"})}
                    {a.frailty_level ? ` · ${a.frailty_level}` : ""}
                  </div>
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{fontSize:16,fontWeight:800,color:mc}}>{a.mcs_total??0}<span style={{fontSize:10,color:"#8BA3BE"}}>/20</span></div>
                  <div style={{fontSize:9,color:"#8BA3BE"}}>MCS</div>
                </div>
                <div style={{fontSize:14,color:"#8BA3BE",flexShrink:0}}>{isExp?"▲":"▼"}</div>
              </div>

              {/* Expanded detail */}
              {isExp && (
                <div style={{borderTop:"1px solid #EEF4FB",padding:"14px 16px"}}>
                  {/* Gait params */}
                  {a.gait_speed!=null && (
                    <div style={{marginBottom:14}}>
                      <div style={{fontSize:9,fontWeight:700,letterSpacing:1,color:"#8BA3BE",marginBottom:8}}>GAIT PARAMETERS</div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
                        {[
                          {l:"Speed",v:a.gait_speed,u:"m/s"},
                          {l:"Cadence",v:a.gait_cadence,u:"spm"},
                          {l:"Stride",v:a.gait_stride_length,u:"m"},
                          {l:"Step W.",v:a.gait_step_width,u:"m"},
                          {l:"Symmetry",v:a.gait_symmetry,u:"%"},
                          {l:"Variab.",v:a.gait_variability,u:"%CV"},
                        ].map(g=>(
                          <div key={g.l} style={{background:"#F4F8FD",borderRadius:8,padding:"7px 8px",textAlign:"center"}}>
                            <div style={{fontSize:8,color:"#8BA3BE",fontWeight:600,marginBottom:2}}>{g.l.toUpperCase()}</div>
                            <div style={{fontSize:11,fontWeight:700,color:"#12263A"}}>{g.v??"-"}<span style={{fontSize:8,color:"#8BA3BE",marginLeft:1}}>{g.u}</span></div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  {/* MCS scores */}
                  <div style={{marginBottom:14}}>
                    <div style={{fontSize:9,fontWeight:700,letterSpacing:1,color:"#8BA3BE",marginBottom:8}}>MCS EXERCISE SCORES</div>
                    {MCS_LABELS.map(t=>{
                      const s=scores[t.id]; const pct=s!=null?Math.round((s/t.max)*100):null;
                      const c=pct==null?"#D0E0EF":pct>=67?"#0D7A5F":pct>=34?"#C97B00":"#C0392B";
                      return (
                        <div key={t.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
                          <div style={{fontSize:10,color:"#4A6280",width:80,flexShrink:0}}>{t.label}</div>
                          <div style={{flex:1,background:"#EBF3FF",borderRadius:3,height:5}}>
                            {s!=null&&<div style={{width:`${pct}%`,height:"100%",background:c,borderRadius:3,transition:"width 0.4s"}}/>}
                          </div>
                          <div style={{fontSize:10,fontWeight:700,color:c,width:26,textAlign:"right"}}>
                            {s!=null?`${s}/${t.max}`:"—"}
                          </div>
                        </div>
                      );
                    })}
                  </div>

                  {/* Clinical note */}
                  {a.clinical_note && (
                    <div style={{background:"#FFFFF0",border:"1px solid #F5D58A",borderRadius:8,padding:"8px 12px",
                      marginBottom:12,fontSize:11,color:"#4A6280",lineHeight:1.6}}>
                      <strong style={{color:"#C97B00"}}>Note: </strong>{a.clinical_note}
                    </div>
                  )}

                  {/* PDF button */}
                  <button onClick={()=>onDownloadPDF(a)}
                    style={{width:"100%",padding:"11px",borderRadius:10,border:"1px solid #D0E0EF",
                      background:"#F4F8FD",color:"#1A6FBF",fontSize:12,fontWeight:700,cursor:"pointer",
                      display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                      <path d="M2 10V12H12V10M7 2V9M4 6L7 9L10 6" stroke="#1A6FBF" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/>
                    </svg>
                    Download PDF Report
                  </button>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   SAVE ASSESSMENT MODAL
═══════════════════════════════════════════════════════════ */
function SaveAssessmentModal({ patient, frailty, gaitData, mcsTotal, taskScores, onSave, onClose }) {
  const [note, setNote] = useState("");
  const [loading, setLoading] = useState(false);
  const [done, setDone] = useState(false);
  const [savedRec, setSavedRec] = useState(null);
  const mcsC = mcsTotal>=14?"#0D7A5F":mcsTotal>=8?"#C97B00":"#C0392B";
  const fColor = frailty?.level==="Non-frail"?"#0D7A5F":frailty?.level==="Frail"?"#C0392B":"#C97B00";

  const handleSave = async () => {
    setLoading(true);
    const rec = await onSave(note);
    setLoading(false);
    if (rec) { setSavedRec(rec); setDone(true); }
  };

  if (done && savedRec) return (
    <div style={{position:"fixed",inset:0,background:"rgba(18,38,58,0.55)",zIndex:100,
      display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div style={{width:"100%",maxWidth:430,background:"#fff",borderRadius:"22px 22px 0 0",
        padding:"28px 22px 40px",textAlign:"center",animation:"authFadeIn 0.25s ease-out"}}>
        <div style={{fontSize:48,marginBottom:12}}>✅</div>
        <div style={{fontSize:18,fontWeight:700,color:"#12263A",marginBottom:6}}>Assessment Saved!</div>
        <div style={{fontSize:13,color:"#8BA3BE",marginBottom:24}}>
          Saved for <strong style={{color:"#12263A"}}>{patient.full_name}</strong>
        </div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={onClose}
            style={{flex:1,padding:"12px",borderRadius:11,border:"1px solid #D0E0EF",
              background:"transparent",color:"#4A6280",fontSize:13,fontWeight:600,cursor:"pointer"}}>
            Done
          </button>
        </div>
      </div>
    </div>
  );

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(18,38,58,0.55)",zIndex:100,
      display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{width:"100%",maxWidth:430,background:"#fff",borderRadius:"22px 22px 0 0",
        padding:"24px 22px 36px",maxHeight:"85vh",overflowY:"auto",animation:"authFadeIn 0.25s ease-out"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
          <div style={{fontSize:16,fontWeight:700,color:"#12263A"}}>Save Assessment</div>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,color:"#8BA3BE",cursor:"pointer"}}>×</button>
        </div>

        {!patient ? (
          <div style={{background:"#FDECEA",border:"1px solid #F4B8B3",borderRadius:10,padding:"12px 14px",
            fontSize:13,color:"#C0392B",marginBottom:14}}>
            ⚠ Please select a patient first before saving.
          </div>
        ) : (
          <div style={{background:"#EBF3FF",border:"1px solid #C8DEFF",borderRadius:10,padding:"10px 14px",
            marginBottom:16,display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:18}}>🧓</span>
            <div>
              <div style={{fontSize:12,fontWeight:700,color:"#12263A"}}>{patient.full_name}</div>
              <div style={{fontSize:10,color:"#8BA3BE"}}>Results will be saved to this patient's record</div>
            </div>
          </div>
        )}

        <div style={{display:"flex",gap:10,marginBottom:16}}>
          {frailty && (
            <div style={{flex:1,background:"#F4F8FD",border:"1px solid #D0E0EF",borderRadius:10,padding:"10px 12px",textAlign:"center"}}>
              <div style={{fontSize:9,color:"#8BA3BE",fontWeight:700,letterSpacing:0.8,marginBottom:4}}>FRAILTY</div>
              <div style={{fontSize:15,fontWeight:800,color:fColor}}>{frailty.level}</div>
            </div>
          )}
          <div style={{flex:1,background:"#F4F8FD",border:"1px solid #D0E0EF",borderRadius:10,padding:"10px 12px",textAlign:"center"}}>
            <div style={{fontSize:9,color:"#8BA3BE",fontWeight:700,letterSpacing:0.8,marginBottom:4}}>MCS</div>
            <div style={{fontSize:15,fontWeight:800,color:mcsC}}>{mcsTotal}/20</div>
          </div>
        </div>

        <div style={{marginBottom:18}}>
          <div style={{fontSize:11,fontWeight:600,color:"#4A6280",marginBottom:6}}>Clinician Note <span style={{color:"#8BA3BE",fontWeight:400}}>(optional)</span></div>
          <textarea className="auth-input" rows={3} placeholder="Add any clinical observations, follow-up actions, or recommendations…"
            value={note} onChange={e=>setNote(e.target.value)}
            style={{resize:"vertical",fontFamily:"inherit",lineHeight:1.5,minHeight:70}}/>
        </div>

        <button className="auth-btn" onClick={handleSave}
          disabled={loading||!patient}
          style={{background:patient?"#1A6FBF":"#8BA3BE"}}>
          {loading?"Saving…":"Save to Patient Record"}
        </button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   AUTH — LOGIN SCREEN
═══════════════════════════════════════════════════════════ */
function LoginScreen({ onSwitch }) {
  const [email, setEmail]       = useState("");
  const [password, setPassword] = useState("");
  const [loading, setLoading]   = useState(false);
  const [error, setError]       = useState("");

  const handleLogin = async () => {
    setError(""); setLoading(true);
    const { error: err } = await sb.auth.signInWithPassword({ email, password });
    setLoading(false);
    if (err) setError(err.message);
  };

  return (
    <div style={{minHeight:"100vh",background:"#EEF4FB",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{width:"100%",maxWidth:380,animation:"authFadeIn 0.5s ease-out"}}>
        {/* Logo */}
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{fontSize:36,fontWeight:800,letterSpacing:-1.5,color:"#1A6FBF"}}>InteliBond</div>
          <div style={{fontSize:13,color:"#8BA3BE",marginTop:4,fontWeight:500}}>AI-Driven Frailty Assessment</div>
        </div>

        <div style={{background:"#fff",borderRadius:24,padding:"32px 28px",boxShadow:"0 4px 32px rgba(26,111,191,0.10)"}}>
          <div style={{fontSize:20,fontWeight:700,color:"#12263A",marginBottom:6}}>Welcome back</div>
          <div style={{fontSize:13,color:"#8BA3BE",marginBottom:24}}>Sign in to your account</div>

          {error && (
            <div style={{background:"#FDECEA",border:"1px solid #F4B8B3",borderRadius:10,padding:"10px 14px",
              fontSize:13,color:"#C0392B",marginBottom:16}}>{error}</div>
          )}

          <div style={{marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:600,color:"#4A6280",marginBottom:6}}>Email</div>
            <input className="auth-input" type="email" placeholder="you@email.com"
              value={email} onChange={e=>setEmail(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&handleLogin()}/>
          </div>

          <div style={{marginBottom:24}}>
            <div style={{fontSize:12,fontWeight:600,color:"#4A6280",marginBottom:6}}>Password</div>
            <input className="auth-input" type="password" placeholder="••••••••"
              value={password} onChange={e=>setPassword(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&handleLogin()}/>
          </div>

          <button className="auth-btn" onClick={handleLogin} disabled={loading||!email||!password}>
            {loading ? "Signing in…" : "Sign In"}
          </button>

          <div style={{textAlign:"center",marginTop:20,fontSize:13,color:"#8BA3BE"}}>
            Don't have an account?{" "}
            <span onClick={()=>onSwitch("signup")}
              style={{color:"#1A6FBF",fontWeight:600,cursor:"pointer"}}>Sign up</span>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   AUTH — SIGN UP SCREEN
═══════════════════════════════════════════════════════════ */
function SignupScreen({ onSwitch }) {
  const [fullName, setFullName] = useState("");
  const [email, setEmail]       = useState("");
  const [password, setPassword] = useState("");
  const [phone, setPhone]       = useState("");
  const [role, setRole]         = useState("caregiver");

/* ═══════════════════════════════════════════════════════════
   AUTH GATE — wraps entire app
═══════════════════════════════════════════════════════════ */
function AuthGate() {
  const [session, setSession]   = useState(undefined); // undefined = loading
  const [profile, setProfile]   = useState(null);
  const [authView, setAuthView] = useState("login");

  useEffect(() => {
    sb.auth.getSession().then(({ data: { session } }) => setSession(session));
    const { data: { subscription } } = sb.auth.onAuthStateChange((_e, session) => {
      setSession(session);
      if (!session) setProfile(null);
    });
    return () => subscription.unsubscribe();
  }, []);

  useEffect(() => {
    if (!session) return;
    sb.from("profiles").select("*").eq("id", session.user.id).single()
      .then(({ data }) => setProfile(data));
  }, [session]);

  // Loading spinner
  if (session === undefined) return (
    <div style={{minHeight:"100vh",background:"#EEF4FB",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{width:36,height:36,border:"3px solid #D0E0EF",borderTopColor:"#1A6FBF",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
    </div>
  );

  if (!session) {
    if (authView === "signup") return <SignupScreen onSwitch={setAuthView}/>;
    return <LoginScreen onSwitch={setAuthView}/>;
  }

  return <InteliBond session={session} profile={profile} />;
}

/* ═══════════════════════════════════════════════════════════
   MULTI-PERSON DETECTION HELPERS
   We use a simple heuristic: if MediaPipe detects landmarks
   and there are multiple distinct hip-center clusters in
   the frame, we count extra people as "helpers".
   Since MediaPipe Pose tracks ONE person at a time, we use
   a secondary detection: we look at ALL visible landmarks
   and check if there are anomalous duplicate body segments
   that suggest overlapping persons.
   
   For robust multi-person: we run Pose on multiple crops
   or use the holistic detection. Here we use a practical
   approach: track the subject's hip position. If a second
   set of shoulder/hip landmarks appears at a significantly
   different x-position, count as helper.
   
   UPGRADED: We use two Pose instances scanning left/right
   halves when the frame is wide enough, or detect via
   body-width anomalies.
═══════════════════════════════════════════════════════════ */

/* Simple helper count from landmark analysis:
   - We track the "subject" as the first person detected
   - On each frame we check if shoulder spread is anomalously wide
     (>0.35 of frame = likely 2 people side by side)
   - We also check for duplicate hip detections via visibility scores
*/
function estimatePersonCount(lms) {
  if (!lms || lms.length === 0) return 0;
  
  const lSh = lms[11], rSh = lms[12];
  const lHip = lms[23], rHip = lms[24];
  const lAnkle = lms[27], rAnkle = lms[28];
  
  if (!lSh || !rSh || !lHip || !rHip) return 1;
  
  // Shoulder spread in normalized coordinates
  const shoulderSpread = Math.abs(lSh.x - rSh.x);
  const hipSpread = Math.abs(lHip.x - rHip.x);
  
  // Normal single person: shoulder spread ~0.10-0.25
  // Two people side by side: spread > 0.35
  // Three+ people: spread > 0.50
  
  // Also check: ratio of hip spread to shoulder spread
  // For single person this is roughly consistent (~0.7-1.2)
  // For multiple people the landmarks jump between persons
  
  const ratio = hipSpread > 0.01 ? shoulderSpread / hipSpread : 1;
  
  // Visibility check: if key landmarks have very low visibility,
  // MediaPipe is struggling with multiple overlapping bodies
  const avgVis = [lSh, rSh, lHip, rHip].reduce((s, p) => s + (p.visibility || 0), 0) / 4;
  
  // Heuristic scoring
  let count = 1;
  if (shoulderSpread > 0.50) count = 3;
  else if (shoulderSpread > 0.35) count = 2;
  
  // If ratio is very abnormal, likely multi-person
  if (ratio > 2.5 || ratio < 0.3) count = Math.max(count, 2);
  
  // Low average visibility with wide spread = multiple people
  if (avgVis < 0.5 && shoulderSpread > 0.28) count = Math.max(count, 2);
  
  return count;
}

/* Track helper count over frames with smoothing */
function useHelperTracker() {
  const countsRef = useRef([]);
  const helperRef = useRef(0);
  
  const update = useCallback((lms) => {
    const count = estimatePersonCount(lms);
    const counts = countsRef.current;
    counts.push(count);
    if (counts.length > 30) counts.shift(); // 1-second window at ~30fps
    
    // Use the MODE (most frequent) count over the window
    const freq = {};
    counts.forEach(c => { freq[c] = (freq[c] || 0) + 1; });
    let maxFreq = 0, modeCount = 1;
    Object.entries(freq).forEach(([k, v]) => {
      if (v > maxFreq) { maxFreq = v; modeCount = parseInt(k); }
    });
    
    helperRef.current = Math.max(0, modeCount - 1); // subtract the subject
    return helperRef.current;
  }, []);
  
  const reset = useCallback(() => {
    countsRef.current = [];
    helperRef.current = 0;
  }, []);
  
  return { update, reset, getHelpers: () => helperRef.current };
}

/* ═══════════════════════════════════════════════════════════
   MEDIAPIPE POSE CANVAS
═══════════════════════════════════════════════════════════ */
function PoseCanvas({ videoRef, active, onLandmarks }) {
  const cvRef   = useRef(null);
  const poseRef = useRef(null);
  const rafRef  = useRef(null);
  const readyR  = useRef(false);

  useEffect(() => {
    if (!active) {
      cancelAnimationFrame(rafRef.current);
      const cv = cvRef.current;
      if (cv) cv.getContext("2d").clearRect(0,0,cv.width,cv.height);
      return;
    }
    if (!window.Pose) { console.warn("[PoseCanvas] window.Pose not available"); return; }

    console.log("[PoseCanvas] Initializing MediaPipe Pose...");
    const pose = new window.Pose({
      locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`,
    });
    pose.setOptions({ modelComplexity:1, smoothLandmarks:true,
      enableSegmentation:false, minDetectionConfidence:0.5, minTrackingConfidence:0.5 });

    pose.onResults(results => {
      const cv = cvRef.current; if (!cv) return;
      const vid = videoRef.current;
      if (vid) { cv.width = vid.videoWidth||640; cv.height = vid.videoHeight||480; }
      const ctx = cv.getContext("2d");
      ctx.clearRect(0,0,cv.width,cv.height);
      if (!results.poseLandmarks) return;
      if (window.drawConnectors && window.POSE_CONNECTIONS)
        window.drawConnectors(ctx, results.poseLandmarks, window.POSE_CONNECTIONS,
          { color:"rgba(0,229,255,0.9)", lineWidth:2.5 });
      if (window.drawLandmarks)
        window.drawLandmarks(ctx, results.poseLandmarks,
          { color:"#FFD600", fillColor:"#FF6D00", lineWidth:1, radius:5 });
      
      // Draw helper detection zone indicator
      const personCount = estimatePersonCount(results.poseLandmarks);
      if (personCount > 1) {
        ctx.save();
        ctx.fillStyle = "rgba(192,57,43,0.7)";
        ctx.font = "bold 16px sans-serif";
        ctx.fillText(`👥 ${personCount} people detected`, 10, cv.height - 15);
        ctx.restore();
      }
      
      if (onLandmarks) onLandmarks(results.poseLandmarks, results.poseWorldLandmarks||null);
    });

    pose.initialize().then(() => {
      console.log("[PoseCanvas] MediaPipe Pose ready!");
      readyR.current=true; poseRef.current=pose;
    }).catch(err => console.error("[PoseCanvas] Init error:", err));

    let stopped=false;
    async function loop() {
      if (stopped) return;
      const vid=videoRef.current, p=poseRef.current;
      if (vid && vid.readyState>=2 && readyR.current && p)
        try { await p.send({image:vid}); } catch(e){ console.warn("[PoseCanvas] send error:", e); }
      rafRef.current = requestAnimationFrame(loop);
    }
    loop();
    return () => { stopped=true; cancelAnimationFrame(rafRef.current); readyR.current=false; try{pose.close();}catch(_){} };
  }, [active]);

  return <canvas ref={cvRef} className="pose-canvas"/>;
}

/* ═══════════════════════════════════════════════════════════
   EXERCISE STATE MACHINES  (pure functions)
   Now with integrated helper count
═══════════════════════════════════════════════════════════ */

// ── EX1: Lying → Sitting ──────────────────────────────────
function ex1Tick(state, lms, helpers) {
  if (!lms||lms.length===0) return state;
  const sh=lms[11],hip=lms[23];
  if (!sh||!hip) return state;
  const diff=Math.abs(sh.y-hip.y);
  const pose = diff<0.12?"LYING":diff>0.30?"SITTING":"TRANS";

  let s={...state, helpers};
  if (s.phase==="DETECTING_LIE") {
    if (pose==="LYING") { s.lyingCount=(s.lyingCount||0)+1;
      if (s.lyingCount>=15) { s.phase="LYING_CONFIRMED"; }
    } else { s.lyingCount=0; }
  } else if (s.phase==="LYING_CONFIRMED") {
    if (pose==="SITTING") { s.sitCount=(s.sitCount||0)+1;
      if (s.sitCount>=15) {
        s.phase="SCORED";
        // Standard: 2=independent, 1=1 helper, 0=2+ helpers
        s.score = helpers===0?2 : helpers===1?1 : 0;
      }
    } else if (pose!=="LYING") { s.sitCount=0; }
  }
  s.pose=pose; s.diff=diff;
  return s;
}

// ── EX2: Sitting → Lying ─────────────────────────────────
function ex2Tick(state, lms, helpers) {
  if (!lms||lms.length===0) return state;
  const sh=lms[11],hip=lms[23];
  if (!sh||!hip) return state;
  const diff=Math.abs(sh.y-hip.y);
  const pose=diff<0.12?"LYING":diff>0.30?"SITTING":"TRANS";

  let s={...state, helpers};
  if (s.phase==="DETECTING_SIT") {
    if (pose==="SITTING") { s.sitCount=(s.sitCount||0)+1;
      if (s.sitCount>=15) { s.phase="SITTING_CONFIRMED"; }
    } else { s.sitCount=0; }
  } else if (s.phase==="SITTING_CONFIRMED") {
    if (pose==="LYING") { s.lyingCount=(s.lyingCount||0)+1;
      if (s.lyingCount>=15) {
        s.phase="SCORED";
        s.score = helpers===0?2 : helpers===1?1 : 0;
      }
    } else if (pose!=="SITTING") { s.lyingCount=0; }
  }
  s.pose=pose; s.diff=diff;
  return s;
}

// ── EX3: Sitting → Standing  (timed) ─────────────────────
function ex3Tick(state, lms, nowMs, helpers) {
  if (!lms||lms.length===0) return state;
  const lhip=lms[23],rhip=lms[24],lknee=lms[25],rknee=lms[26];
  if (!lhip||!lknee) return state;
  const hip_y  = (lhip.y +(rhip?rhip.y:lhip.y))/2;
  const knee_y = (lknee.y+(rknee?rknee.y:lknee.y))/2;
  const gap    = knee_y - hip_y;
  const pose   = gap<0.05?"SITTING":gap>0.15?"STANDING":"TRANS";

  let s={...state, helpers};
  if (s.phase==="DETECTING_SIT") {
    if (pose==="SITTING") { s.sitCount=(s.sitCount||0)+1;
      if (s.sitCount>=15) { s.phase="SITTING_CONFIRMED_STAND"; }
    } else { s.sitCount=0; }
  } else if (s.phase==="SITTING_CONFIRMED_STAND") {
    if (pose==="TRANS"||pose==="STANDING") {
      s.phase="MOVING"; s.timerStart=nowMs;
    }
  } else if (s.phase==="MOVING") {
    if (pose==="STANDING") { s.standCount=(s.standCount||0)+1;
      if (s.standCount>=15) {
        const elapsed=(nowMs-s.timerStart)/1000;
        s.elapsed=elapsed; s.phase="SCORED";
        // Standard: 3=independent <3s, 2=independent >3s, 1=1 helper, 0=2+ helpers
        s.score = helpers>=2?0 : helpers===1?1 : elapsed<=3?3:2;
      }
    } else s.standCount=0;
  }
  s.pose=pose; s.gap=gap;
  return s;
}

// ── EX4: Standing (balance + reach detection) ────────────
function ex4Tick(state, lms, nowMs, helpers) {
  if (!lms||lms.length===0) return state;
  const lhip=lms[23],rhip=lms[24],lknee=lms[25],rknee=lms[26];
  const lwrist=lms[15];
  if (!lhip||!lknee) return state;
  const hip_y  = (lhip.y +(rhip?rhip.y:lhip.y))/2;
  const knee_y = (lknee.y+(rknee?rknee.y:lknee.y))/2;
  const gap    = knee_y-hip_y;
  const pose   = gap>0.15?"STANDING":"NOT_STANDING";

  let s={...state, helpers};

  if (s.phase==="DETECTING_STAND") {
    if (pose==="STANDING") { s.standCount=(s.standCount||0)+1;
      if (s.standCount>=15) { s.phase="HOLDING"; s.holdStart=nowMs; s.wristRest=lwrist?{x:lwrist.x,y:lwrist.y}:null; }
    } else { s.standCount=0; }
  } else if (s.phase==="HOLDING") {
    if (pose==="NOT_STANDING") { s.phase="DETECTING_STAND"; s.standCount=0; s.holdStart=null; s.wristRest=null; }
    else {
      if (!s.reachDetected && s.wristRest && lwrist) {
        const dx=lwrist.x-s.wristRest.x, dy=lwrist.y-s.wristRest.y;
        if (Math.sqrt(dx*dx+dy*dy)>0.15) s.reachDetected=true;
      }
      const elapsed=(nowMs-s.holdStart)/1000;
      if (elapsed>=15) {
        s.phase="SCORED";
        // Standard: 3=stands w/o support & reaches, 2=stands w/o support no reach,
        // 1=stands but needs support, 0=physical support of another person
        s.score = helpers>=1 ? (s.reachDetected?1:0) : s.reachDetected?3:2;
        s.elapsed=elapsed;
      }
    }
  }
  s.pose=pose; s.gap=gap;
  return s;
}

// ── EX5: Gait ──────────────────────────────────────────
function ex5Tick(state, lms, nowMs, helpers) {
  if (!lms||lms.length===0) return state;
  const ls=lms[11],rs=lms[12],lh=lms[23],rh=lms[24];
  if (!ls||!lh) return state;

  let s={...state, helpers};
  if (s.phase!=="WALKING") return s;

  const smx=(ls.x+(rs?rs.x:ls.x))/2, smy=(ls.y+(rs?rs.y:ls.y))/2;
  const hmx=(lh.x+(rh?rh.x:lh.x))/2, hmy=(lh.y+(rh?rh.y:lh.y))/2;
  const dx=smx-hmx, dy=hmy-smy;
  const lean=dy>0?Math.abs(Math.atan2(dx,dy)*180/Math.PI):90;

  s.frames=(s.frames||[]);
  s.frames.push({lean, smx, hmy, hmx});
  if (s.frames.length>150) s.frames=s.frames.slice(-150);

  const erraticFrames=s.frames.filter(f=>f.lean>20).length;
  s.erraticRatio=erraticFrames/s.frames.length;

  const elapsed=(nowMs-s.walkStart)/1000;
  s.elapsed=elapsed;

  if (elapsed>=s.duration) {
    s.phase="SCORED";
    const erratic=s.erraticRatio>0.20;
    // Standard: 3=independent(±stick), 2=independent w/ frame, 1=erratic/unsafe, 0=needs physical help
    s.score = helpers>=1?0 : erratic?1 : 3;
  }
  return s;
}

// ── EX6: Timed 6m Walk ────────────────────────────────────
function ex6Tick(state, lms, nowMs) {
  if (!lms||lms.length===0) return state;
  let s={...state};
  if (s.phase==="WALKING") {
    const elapsed=(nowMs-s.walkStart)/1000;
    s.elapsed=elapsed;
    if (s.manualStop||elapsed>=60) {
      s.phase="SCORED";
      // Standard: 3=under 15s, 2=16-30s, 1=over 30s, 0=unable to cover 6 metres
      s.score = s.unable?0 : elapsed<=15?3 : elapsed<=30?2:1;
    }
  }
  return s;
}

// ── EX7: Functional Reach ────────────────────────────────
function ex7Tick(state, lms, worldLms, nowMs) {
  if (!lms||lms.length===0) return state;
  let s={...state};

  const lIndex=lms[19], lShoulder=lms[11], rShoulder=lms[12];
  if (!lIndex||!lShoulder) return s;

  const shoulderSpread=Math.abs(lShoulder.x-(rShoulder?rShoulder.x:lShoulder.x));
  s.sideView=shoulderSpread<0.15;

  if (s.phase==="DETECTING_ARM") {
    const lWrist=lms[15];
    if (lWrist && Math.abs(lWrist.y-lShoulder.y)<0.08) {
      s.armReadyCount=(s.armReadyCount||0)+1;
      if (s.armReadyCount>=30) {
        s.phase="TRACKING"; s.trackStart=nowMs;
        if (worldLms && worldLms[19]) {
          s.fixedWorld={x:worldLms[19].x, y:worldLms[19].y, z:worldLms[19].z};
        }
        s.fixedPixel={x:lIndex.x, y:lIndex.y};
        s.maxReachCm=0;
      }
    } else s.armReadyCount=0;
  } else if (s.phase==="TRACKING") {
    const elapsed=(nowMs-s.trackStart)/1000;
    s.elapsed=elapsed;

    if (worldLms && worldLms[19] && s.fixedWorld) {
      const dz=Math.abs(worldLms[19].z - s.fixedWorld.z);
      const cm=dz*100;
      if (cm>s.maxReachCm) s.maxReachCm=cm;
    }
    s.currentPixel={x:lIndex.x, y:lIndex.y};

    if (elapsed>=8) {
      s.phase="SCORED";
      // Standard: 4=over 20cm, 2=10-20cm, 0=under 10cm
      s.score=s.maxReachCm>20?4:s.maxReachCm>=10?2:0;
    }
  }
  return s;
}

  IDLE:                "Press Start to begin",

  DETECTING_SIT:       "Detecting sitting pose… Sit up!",

  SITTING_CONFIRMED_STAND: "Sitting confirmed — now stand up!",

  DETECTING_STAND:     "Detecting standing pose… Stand up!",

};

function phaseLabel(ph) { return PHASE_LABELS[ph]||ph; }
function poseColor(pose) {
  if (!pose) return T.text3;
  const p=pose.toUpperCase();
  if (p.includes("LIE")||p.includes("LYING")) return T.danger;
  if (p.includes("SIT")) return T.accent;
  if (p.includes("STAND")||p.includes("HOLD")) return T.success;
  if (p.includes("TRANS")||p.includes("MOVING")) return T.warning;
  return T.text3;
}
function isRunning(phase) { return phase!=="IDLE" && phase!=="SCORED"; }

/* ═══════════════════════════════════════════════════════════
   SHARED UI HELPERS
═══════════════════════════════════════════════════════════ */
function ArcGauge({ value, max=20, size=110, color }) {
  const r=40,cx=size/2,cy=size/2+6, toR=d=>d*Math.PI/180, sA=-215,sw=250;
  const arc=a=>({x:cx+r*Math.cos(toR(a)),y:cy+r*Math.sin(toR(a))});
  const ts=arc(sA),te=arc(sA+sw),ve=arc(sA+(value/max)*sw);
  const lg=sw>180?1:0, vl=(value/max)*sw>180?1:0;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <path d={`M${ts.x.toFixed(1)},${ts.y.toFixed(1)} A${r},${r} 0 ${lg},1 ${te.x.toFixed(1)},${te.y.toFixed(1)}`} fill="none" stroke={T.blue2} strokeWidth="7" strokeLinecap="round"/>
      <path d={`M${ts.x.toFixed(1)},${ts.y.toFixed(1)} A${r},${r} 0 ${vl},1 ${ve.x.toFixed(1)},${ve.y.toFixed(1)}`} fill="none" stroke={color} strokeWidth="7" strokeLinecap="round"/>
      <text x={cx} y={cy-8} textAnchor="middle" fontSize="20" fontWeight="700" fill={color}>{value}</text>
      <text x={cx} y={cy+7} textAnchor="middle" fontSize="10" fill={T.text3}>/ {max}</text>
      <text x={cx} y={cy+20} textAnchor="middle" fontSize="9" fill={T.text3}>MCS</text>
    </svg>
  );
}
function Spark({ data, color }) {
  if (!data||data.length<2) return null;
  const mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;
  const W=70,H=24;
  const pts=data.map((v,i)=>`${((i/(data.length-1))*W).toFixed(1)},${(H-((v-mn)/rng)*(H-4)-2).toFixed(1)}`).join(" ");
  return <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`}><polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" opacity="0.9"/></svg>;
}
function GaitCard({ label, value, unit, lo, hi, history, icon }) {
  const empty=value==null;
  const norm=empty?0:Math.min(1,Math.max(0,(value-lo)/(hi-lo)));
  const c=empty?T.text3:norm>0.6?T.success:norm>0.3?T.warning:T.danger;
  return (
    <div style={{background:T.surface,borderRadius:14,padding:"13px 14px 10px",border:`1px solid ${T.border}`,boxShadow:"0 1px 4px rgba(26,111,191,0.06)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
        <span style={{fontSize:10,fontWeight:600,letterSpacing:0.6,color:T.text3,textTransform:"uppercase"}}>{label}</span>
        {icon&&<span style={{fontSize:14,opacity:0.5}}>{icon}</span>}
      </div>
      <div style={{fontSize:22,fontWeight:700,color:empty?T.text3:c,letterSpacing:-0.5,lineHeight:1}}>{empty?"—":value}</div>
      <div style={{fontSize:10,color:T.text3,marginBottom:history?6:0}}>{unit}</div>
      {history&&<Spark data={history} color={c}/>}
    </div>
  );
}
function OptionBtn({ opt, selected, onSelect }) {
  return (
    <button onClick={()=>onSelect(opt.score)} style={{
      width:"100%",textAlign:"left",padding:"11px 14px",borderRadius:10,marginBottom:6,
      border:`1.5px solid ${selected?T.primary:T.border}`,cursor:"pointer",
      transition:"all 0.15s",background:selected?T.blue1:T.surface,
      display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <span style={{fontSize:13,color:selected?T.primary:T.text2}}>{opt.desc}</span>
      <span style={{fontSize:13,fontWeight:700,color:selected?T.primary:T.text3,minWidth:20,textAlign:"right"}}>{opt.score}</span>
    </button>
  );
}
function ProgressRing({ progress, size=36, strokeW=3, color }) {
  const r=(size-strokeW)/2,c=size/2,circ=2*Math.PI*r, offset=circ*(1-Math.min(1,progress));
  return (
    <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
      <circle cx={c} cy={c} r={r} fill="none" stroke={T.border} strokeWidth={strokeW}/>
      <circle cx={c} cy={c} r={r} fill="none" stroke={color} strokeWidth={strokeW}
        strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round" style={{transition:"stroke-dashoffset 0.2s"}}/>
    </svg>
  );
}

}

            </div>
          </div>
          <button onClick={onStart} style={{width:"100%",padding:"14px",borderRadius:13,border:"none",cursor:"pointer",
            fontSize:14,fontWeight:700,background:T.primary,color:"#fff",
            boxShadow:`0 3px 12px rgba(26,111,191,0.35)`}}>
            ▶ Start Exercise {exIdx}
          </button>
        </div>
      )}

      {/* Running — cancel */}
      {running&&!scored&&(
        <button onClick={onReset} style={{width:"100%",marginTop:4,padding:"11px",borderRadius:10,
          border:`1px solid ${T.border2}`,background:"transparent",color:T.text3,fontSize:12,fontWeight:600,cursor:"pointer"}}>
          Cancel
        </button>
      )}

      {/* Scored */}
      {scored&&<ScoreResult task={task} exState={exState} onAccept={onAccept} onRetry={onReset}/>}

      {/* If saved score exists and idle — show override options */}
      {idle&&savedScore!=null&&(
        <div style={{marginTop:10}}>
          <div style={{fontSize:11,color:T.text3,marginBottom:6}}>Saved score: <strong>{savedScore}/{task.maxScore}</strong> — override:</div>
          {task.options.map(opt=>(
            <OptionBtn key={opt.score} opt={opt} selected={savedScore===opt.score}
              onSelect={s=>onAccept(s)}/>
          ))}
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   MAIN APP
═══════════════════════════════════════════════════════════ */
function InteliBond({ session, profile }) {
  const [view, setView]           = useState("home");
  const [tab, setTab]             = useState("assessment");
  const [profileData, setProfileData] = useState({
    full_name:"", phone:"", age:"", gender:"",
    date_of_birth:"", medical_conditions:"", medications:""
  });
  const [profileSaving, setProfileSaving] = useState(false);
  const [profileSaved,  setProfileSaved]  = useState(false);
  const [myHistory, setMyHistory]         = useState([]);
  const [myHistLoading, setMyHistLoading] = useState(false);
  const [gaitRecording, setGaitR] = useState(false);
  const [gaitElapsed, setGaitE]   = useState(0);
  const [gaitData, setGaitData]   = useState(null);
  const [frailty, setFrailty]     = useState(null);
  const [liveApi, setLiveApi]     = useState(false);
  const [gaitLMs, setGaitLMs]     = useState([]);
  const [assLMs, setAssLMs]       = useState([]);
  const [camError, setCamError]   = useState(null);
  const [activeTask, setActiveTask] = useState(0);
  const [taskScores, setTaskScores] = useState({});
  const [helperCount, setHelperCount] = useState(0);

  // Patient management & persistence
  const [selectedPatient, setSelectedPatient] = useState(null);
  const [showAddPatient, setShowAddPatient]   = useState(false);
  const [showSaveModal, setShowSaveModal]     = useState(false);
  const [historyPatient, setHistoryPatient]   = useState(null);
  const caregiverId = profile?.role!=="elderly" ? session?.user?.id : null;
  const { patients, loading:pLoading, addPatient, deletePatient } = usePatients(caregiverId);
  const { assessments, loading:aLoading, saveAssessment } = useAssessments(historyPatient?.id ?? selectedPatient?.id);

  const [exStates, setExStates] = useState({
    1:{...EX_INITIAL[1]}, 2:{...EX_INITIAL[2]}, 3:{...EX_INITIAL[3]},
    4:{...EX_INITIAL[4]}, 5:{...EX_INITIAL[5]}, 6:{...EX_INITIAL[6]},
    7:{...EX_INITIAL[7]},
  });

  const gaitVideoRef = useRef(null);
  const assVideoRef  = useRef(null);
  const capCanvas    = useRef(null);
  const gaitStream   = useRef(null);
  const assStream    = useRef(null);
  const gaitTimer    = useRef(null);
  const gaitPoll     = useRef(null);

  // Helper tracker
  const helperTracker = useHelperTracker();

  const mcsTotal    = MCS_TASKS.reduce((s,t)=>s+(taskScores[t.id]??0),0);
  const mcsComplete = Object.keys(taskScores).length===MCS_TASKS.length;
  const fmt = s=>`${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;

  const activeTaskRef=useRef(activeTask);
  useEffect(()=>{activeTaskRef.current=activeTask;},[activeTask]);

  /* ── Landmark callback — drives state machines + helper detection ── */
  const handleAssLMs = useCallback((lms, worldLms) => {
    setAssLMs(lms);
    const now=Date.now();
    const ati = activeTaskRef.current;
    
    // Update helper count from landmark analysis
    const helpers = helperTracker.update(lms);
    setHelperCount(helpers);
    
    setExStates(prev => {
      const idx=ati+1;
      const cur=prev[idx];
      if (!cur || cur.phase==="SCORED" || cur.phase==="IDLE") return prev;
      let next;
      if      (idx===1) next=ex1Tick(cur,lms,helpers);
      else if (idx===2) next=ex2Tick(cur,lms,helpers);
      else if (idx===3) next=ex3Tick(cur,lms,now,helpers);
      else if (idx===4) next=ex4Tick(cur,lms,now,helpers);
      else if (idx===5) next=ex5Tick(cur,lms,now,helpers);
      else if (idx===6) next=ex6Tick(cur,lms,now);
      else if (idx===7) next=ex7Tick(cur,lms,worldLms,now);
      else return prev;
      if (next===cur) return prev;
      return {...prev,[idx]:next};
    });
  },[]);

  /* ── Exercise controls ──────────────────────────── */
  const startExercise = useCallback(idx => {
    console.log(`[startExercise] Starting exercise ${idx}`);
    helperTracker.reset(); // Reset helper tracking for new exercise
    setHelperCount(0);
    setExStates(prev=>{
      const fresh={...EX_INITIAL[idx]};
      switch(idx) {
        case 1: fresh.phase="DETECTING_LIE";   break;
        case 2: fresh.phase="DETECTING_SIT";    break;
        case 3: fresh.phase="DETECTING_SIT";    break;
        case 4: fresh.phase="DETECTING_STAND";  break;
        case 5: fresh.phase="WALKING"; fresh.walkStart=Date.now(); break;
        case 6: break;
        case 7: fresh.phase="DETECTING_ARM";    break;
      }
      return {...prev,[idx]:fresh};
    });
  },[]);

  const resetExercise = useCallback(idx => {
    helperTracker.reset();
    setHelperCount(0);
    setExStates(prev=>({...prev,[idx]:{...EX_INITIAL[idx]}}));
  },[]);

  const acceptScore = useCallback((idx,score) => {
    const taskId=MCS_TASKS[idx-1].id;
    setTaskScores(p=>({...p,[taskId]:score}));
    resetExercise(idx);
    setActiveTask(a=>a===idx-1?Math.min(idx,MCS_TASKS.length-1):a);
  },[resetExercise]);

  const startWalk = useCallback(idx => {
    helperTracker.reset();
    setHelperCount(0);
    setExStates(prev=>({...prev,[idx]:{...EX_INITIAL[idx],phase:"WALKING",walkStart:Date.now()}}));
  },[]);

  const stopWalk = useCallback(idx => {
    setExStates(prev=>{
      const cur=prev[idx];
      const elapsed=(Date.now()-cur.walkStart)/1000;
      const score=elapsed<=15?3:elapsed<=30?2:1;
      return {...prev,[idx]:{...cur,phase:"SCORED",elapsed,score,manualStop:true}};
    });
  },[]);

  /* ── Camera helpers ─────────────────────────────── */
  const openGaitCamera = useCallback(async () => {
    setView("gait_camera");
    await new Promise(r=>setTimeout(r,60));
    try {
      const s=await navigator.mediaDevices.getUserMedia({
        video:{facingMode:"environment",width:{ideal:1280},height:{ideal:720}},audio:false});
      gaitStream.current=s;
      if (gaitVideoRef.current){ gaitVideoRef.current.srcObject=s; gaitVideoRef.current.play(); }
    } catch(e){console.warn(e);}
  },[]);

  const closeGaitCamera = useCallback(()=>{
    gaitStream.current?.getTracks().forEach(t=>t.stop());
    clearInterval(gaitTimer.current); clearInterval(gaitPoll.current);
    setGaitR(false); setView("home");
  },[]);

  useEffect(()=>{
    if (view!=="assessment_camera") return;
    let cancelled=false;
    const t=setTimeout(async()=>{
      if (cancelled) return;
      try {
        setCamError(null);
        if (!assStream.current||assStream.current.getTracks().every(t=>t.readyState==="ended")) {
          const s=await navigator.mediaDevices.getUserMedia({video:true,audio:false});
          if (cancelled){s.getTracks().forEach(t=>t.stop());return;}
          assStream.current=s;
        }
        if (assVideoRef.current){
          assVideoRef.current.srcObject=assStream.current;
          await assVideoRef.current.play().catch(()=>{});
        }
      } catch(e){
        if(!cancelled) setCamError(`${e.name}: ${e.message}`);
      }
    },0);
    return ()=>{cancelled=true;clearTimeout(t);};
  },[view]);

  /* ── Gait recording ─────────────────────────────── */
  const startGait=useCallback(()=>{
    setGaitR(true);setGaitE(0);setGaitData(null);setFrailty(null);
    gaitTimer.current=setInterval(()=>setGaitE(e=>e+1),1000);
    gaitPoll.current=setInterval(async()=>{
      const v=gaitVideoRef.current,c=capCanvas.current;
      if(!v||!c||v.readyState<2)return;
      const ctx=c.getContext("2d");c.width=v.videoWidth||640;c.height=v.videoHeight||480;
      ctx.drawImage(v,0,0,c.width,c.height);
      c.toBlob(async blob=>{
        if(!blob)return;
        try {
          const r=await fetch("http://localhost:5173/frame",{method:"POST",body:blob,
            headers:{"Content-Type":"image/jpeg","ngrok-skip-browser-warning":"1"},signal:AbortSignal.timeout(800)});
          if(r.ok){const d=await r.json();setLiveApi(true);if(d.gait)setGaitData(d.gait);if(d.frailty)setFrailty(d.frailty);}
        } catch {
          setLiveApi(false);
          setGaitData({
            speed:parseFloat((0.88+(Math.random()-0.5)*0.08).toFixed(2)),
            cadence:parseFloat((101+(Math.random()-0.5)*6).toFixed(1)),
            stride_length:parseFloat((1.02+(Math.random()-0.5)*0.06).toFixed(2)),
            step_width:parseFloat((0.17+(Math.random()-0.5)*0.02).toFixed(2)),
            symmetry_index:parseFloat((93+(Math.random()-0.5)*4).toFixed(1)),
            variability:parseFloat((3.8+(Math.random()-0.5)*1.5).toFixed(1)),
            cadence_history:Array.from({length:12},(_,i)=>parseFloat((101+Math.sin(i/2)*3+(Math.random()-0.5)*2).toFixed(1))),
          });
        }
      },"image/jpeg",0.6);
    },200);
  },[]);

  const stopGait=useCallback(()=>{
    setGaitR(false);clearInterval(gaitTimer.current);clearInterval(gaitPoll.current);
    setGaitData(prev=>{
      if(!prev)return prev;
      const s=prev.speed??0.9;
      setFrailty({level:s>=1.0?"Non-frail":s>=0.8?"Pre-frail":"Frail",confidence:0.78});
      return prev;
    });
  },[]);

  useEffect(()=>()=>{
    gaitStream.current?.getTracks().forEach(t=>t.stop());
    assStream.current?.getTracks().forEach(t=>t.stop());
    clearInterval(gaitTimer.current);clearInterval(gaitPoll.current);
  },[]);

  // Fetch profile data on mount
  useEffect(()=>{
    if (!session) return;
    sb.from("profiles").select("*").eq("id", session.user.id).single()
      .then(({data})=>{
        if (data) setProfileData({
          full_name: data.full_name||"",
          phone: data.phone||"",
          age: data.age||"",
          gender: data.gender||"",
          date_of_birth: data.date_of_birth||"",
          medical_conditions: data.medical_conditions||"",
          medications: data.medications||"",
        });
      });
  },[session]);

  // Fetch own history when history tab opened (elderly view)
  useEffect(()=>{
    if (tab!=="history" || isCaregiver) return;
    setMyHistLoading(true);
    sb.from("assessments")
      .select("*").eq("assessed_by", session.user.id)
      .order("assessed_at",{ascending:false})
      .then(({data})=>{ setMyHistory(data||[]); setMyHistLoading(false); });
  },[tab]);

  const saveProfileData = async () => {
    setProfileSaving(true);
    await sb.from("profiles").update({
      full_name:          profileData.full_name,
      phone:              profileData.phone||null,
      age:                profileData.age ? parseInt(profileData.age) : null,
      gender:             profileData.gender||null,
      date_of_birth:      profileData.date_of_birth||null,
      medical_conditions: profileData.medical_conditions||null,
      medications:        profileData.medications||null,
    }).eq("id", session.user.id);
    setProfileSaving(false); setProfileSaved(true);
    setTimeout(()=>setProfileSaved(false), 2500);
  };

  /* ── Persist assessment to Supabase ───────────────── */
  const handleSaveAssessment = useCallback(async (clinicalNote) => {
    const payload = {
      patient_id:          selectedPatient?.id,
      caregiver_id:        session?.user?.id,
      assessed_at:         new Date().toISOString(),
      frailty_level:       frailty?.level ?? null,
      frailty_confidence:  frailty?.confidence ?? null,
      gait_speed:          gaitData?.speed ?? null,
      gait_cadence:        gaitData?.cadence ?? null,
      gait_stride_length:  gaitData?.stride_length ?? null,
      gait_step_width:     gaitData?.step_width ?? null,
      gait_symmetry:       gaitData?.symmetry_index ?? null,
      gait_variability:    gaitData?.variability ?? null,
      mcs_total:           Object.values(taskScores).reduce((a,b)=>a+b,0),
      mcs_scores:          taskScores,
      clinical_note:       clinicalNote || null,
    };
    return await saveAssessment(payload);
  }, [selectedPatient, session, frailty, gaitData, taskScores, saveAssessment]);

  /* ─ patient list / history views ──────────────────── */
  if (view==="patient_list"&&isCaregiver) return (
    <PatientListScreen
      patients={patients} selected={selectedPatient}
      onSelect={setSelectedPatient}
      onAdd={()=>setShowAddPatient(true)}
      onDelete={deletePatient}
      onBack={()=>setView("home")}
      onViewHistory={p=>{setHistoryPatient(p);setView("history");}}
    />
  );

  if (view==="history"&&isCaregiver) return (
    <>
      <AssessmentHistoryScreen
        patient={historyPatient}
        assessments={assessments}
        loading={aLoading}
        caregiverName={profile?.full_name||session?.user?.email}
        onBack={()=>{setView(historyPatient?.id===selectedPatient?.id?"patient_list":"patient_list");setHistoryPatient(null);}}
        onDownloadPDF={a=>generatePDF({patient:historyPatient,assessment:a,caregiverName:profile?.full_name||session?.user?.email})}
      />
    </>
  );

  /* ═══════════════════════════════════════════════════
     GAIT CAMERA VIEW
  ═══════════════════════════════════════════════════ */
  if (view==="gait_camera") {
    const fm2=frailty?(FM[frailty.level]??FM["Pre-frail"]):null;
    return (
      <div style={{background:T.bg,minHeight:"100vh",color:T.text,maxWidth:430,margin:"0 auto",paddingBottom:40}}>
        <div style={{padding:"18px 20px 10px",display:"flex",justifyContent:"space-between",
          alignItems:"center",background:T.surface,borderBottom:`1px solid ${T.border}`}}>
          <button onClick={closeGaitCamera} style={{background:"none",border:"none",color:T.primary,fontSize:13,cursor:"pointer",fontWeight:600}}>← Back</button>
          <span style={{fontSize:14,fontWeight:700}}>Gait Analysis</span>
          <span style={{fontSize:11,color:liveApi?T.success:T.text3,fontWeight:600}}>{liveApi?"● Live":"● Simulated"}</span>
        </div>
        <div className="vid-wrap" style={{margin:"16px 16px 12px",borderRadius:18,overflow:"hidden",
          background:"#000",aspectRatio:"4/3",boxShadow:`0 4px 20px rgba(26,111,191,0.15)`}}>
          <video ref={gaitVideoRef} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}} playsInline muted autoPlay/>
          <PoseCanvas videoRef={gaitVideoRef} active={view==="gait_camera"} onLandmarks={setGaitLMs}/>
          <PoseBadge lms={gaitLMs}/>
          {gaitRecording&&(
            <div style={{position:"absolute",top:10,right:12,zIndex:16,background:"rgba(192,57,43,0.9)",
              borderRadius:20,padding:"4px 12px",fontSize:12,fontWeight:700,color:"#fff",
              display:"flex",alignItems:"center",gap:5}}>
              <span style={{width:6,height:6,borderRadius:"50%",background:"#fff"}}/>REC {fmt(gaitElapsed)}
            </div>
          )}
          <div style={{position:"absolute",bottom:12,left:12,right:12,zIndex:10,
            background:"rgba(18,38,58,0.82)",borderRadius:11,padding:"8px 14px"}}>
            <div style={{fontSize:9,color:T.accent,letterSpacing:0.8,fontWeight:600}}>MEDIAPIPE POSE · CLIENT-SIDE AI</div>
            <div style={{fontSize:11,color:"rgba(255,255,255,0.7)",marginTop:2}}>Side view · Full body · 4 m walkway</div>
          </div>
        </div>
        <div style={{padding:"0 16px 14px"}}>
          <button onClick={gaitRecording?stopGait:startGait} style={{width:"100%",padding:"14px",borderRadius:13,border:"none",
            cursor:"pointer",fontSize:14,fontWeight:700,transition:"all 0.2s",
            background:gaitRecording?"rgba(192,57,43,0.12)":T.primary,
            color:gaitRecording?T.danger:"#fff",
            boxShadow:gaitRecording?`inset 0 0 0 1.5px ${T.danger}`:`0 3px 12px rgba(26,111,191,0.35)`}}>
            {gaitRecording?`■ Stop Recording ${fmt(gaitElapsed)}`:"▶ Start Gait Recording"}
          </button>
        </div>
        {gaitData&&(
          <div style={{margin:"0 16px 12px",background:T.surface,border:`1px solid ${T.border}`,borderRadius:16,padding:"16px"}}>
            <div style={{fontSize:10,fontWeight:700,letterSpacing:1,color:T.text3,marginBottom:12}}>GAIT PARAMETERS</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <GaitCard label="Gait speed"   value={gaitData.speed}          unit="m/s"  lo={0.6} hi={1.3}  icon="🚶"/>
              <GaitCard label="Cadence"       value={gaitData.cadence}        unit="spm"  lo={75}  hi={115}  history={gaitData.cadence_history} icon="⏱"/>
              <GaitCard label="Stride length" value={gaitData.stride_length}  unit="m"    lo={0.7} hi={1.3}  icon="↔"/>
              <GaitCard label="Step width"    value={gaitData.step_width}     unit="m"    lo={0.1} hi={0.25} icon="↕"/>
              <GaitCard label="Symmetry"      value={gaitData.symmetry_index} unit="%"    lo={70}  hi={100}  icon="⚖"/>
              <GaitCard label="Variability"   value={gaitData.variability}    unit="%CV"  lo={0}   hi={10}   icon="〰"/>
            </div>
          </div>
        )}
        {frailty&&(()=>{
          const fml=FM[frailty.level]??FM["Pre-frail"];
          return (
            <div style={{margin:"0 16px",background:fml.bg,border:`1.5px solid ${fml.bd}`,borderRadius:16,
              padding:"18px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:11,fontWeight:700,letterSpacing:0.8,color:T.text3,marginBottom:4}}>ML FRAILTY CLASS</div>
                <div style={{fontSize:28,fontWeight:800,color:fml.ring,letterSpacing:-1}}>{frailty.level}</div>
                <div style={{fontSize:11,color:T.text3,marginTop:3}}>Confidence: {Math.round((frailty.confidence??0.78)*100)}%</div>
              </div>
              <button onClick={closeGaitCamera} style={{background:fml.ring,border:"none",color:"#fff",borderRadius:11,
                padding:"11px 16px",fontSize:12,fontWeight:700,cursor:"pointer"}}>Save & Back</button>
            </div>
          );
        })()}
        <canvas ref={capCanvas} style={{display:"none"}}/>
      </div>
    );
  }

  /* ═══════════════════════════════════════════════════
     ASSESSMENT CAMERA VIEW
  ═══════════════════════════════════════════════════ */
  if (view==="assessment_camera") {
    const ct=MCS_TASKS[activeTask];
    const exIdx=activeTask+1;
    const exState=exStates[exIdx];
    const scored=Object.keys(taskScores).length;
    const savedScore=taskScores[ct.id]??null;

    return (
      <div style={{background:T.bg,minHeight:"100vh",color:T.text,maxWidth:430,margin:"0 auto",paddingBottom:40}}>
        <div style={{padding:"18px 20px 10px",display:"flex",justifyContent:"space-between",
          alignItems:"center",background:T.surface,borderBottom:`1px solid ${T.border}`}}>
          <button onClick={()=>{ assStream.current?.getTracks().forEach(t=>t.stop()); setView("home"); }}
            style={{background:"none",border:"none",color:T.primary,fontSize:13,cursor:"pointer",fontWeight:600}}>← Back</button>
          <span style={{fontSize:14,fontWeight:700}}>MCS Assessment</span>
          <span style={{fontSize:12,color:T.warning,fontWeight:600}}>{scored}/{MCS_TASKS.length}</span>
        </div>

        <div style={{display:"flex",gap:5,justifyContent:"center",padding:"12px 20px 0"}}>
          {MCS_TASKS.map((t,i)=>(
            <button key={t.id} onClick={()=>setActiveTask(i)} style={{flex:1,height:5,borderRadius:3,border:"none",cursor:"pointer",
              background:taskScores[t.id]!=null?T.success:i===activeTask?T.warning:T.border,transition:"all 0.2s"}}/>
          ))}
        </div>

        <div className="vid-wrap" style={{margin:"14px 16px 12px",borderRadius:18,overflow:"hidden",
          background:"#000",aspectRatio:"4/3",boxShadow:`0 4px 20px rgba(26,111,191,0.12)`}}>
          <video ref={assVideoRef} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}} playsInline muted autoPlay/>
          <PoseCanvas videoRef={assVideoRef} active={view==="assessment_camera"} onLandmarks={handleAssLMs}/>
          <PoseBadge lms={assLMs} helperCount={isRunning(exState.phase) && ct.needsHelper ? helperCount : null}/>

          {camError&&(
            <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.85)",zIndex:20,
              display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20,gap:10}}>
              <div style={{fontSize:28}}>📷</div>
              <div style={{fontSize:13,fontWeight:700,color:"#f87171"}}>Camera Error</div>
              <div style={{fontSize:11,color:"rgba(255,255,255,0.7)",textAlign:"center",lineHeight:1.6}}>{camError}</div>
              <button onClick={()=>{setCamError(null);if(assVideoRef.current&&assStream.current){
                assVideoRef.current.srcObject=assStream.current;assVideoRef.current.play().catch(()=>{});}}}
                style={{marginTop:8,padding:"8px 20px",borderRadius:8,border:"none",background:T.primary,color:"#fff",fontSize:12,fontWeight:600,cursor:"pointer"}}>Retry Camera</button>
            </div>
          )}

          {/* EX7 reach overlay */}
          {exIdx===7 && exState.phase==="TRACKING" && exState.fixedPixel && exState.currentPixel && (() => {
            const fp=exState.fixedPixel, cp=exState.currentPixel;
            const svgW=640, svgH=480;
            return (
              <svg style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",pointerEvents:"none"}}
                viewBox={`0 0 ${svgW} ${svgH}`} preserveAspectRatio="xMidYMid meet">
                <circle cx={fp.x*svgW} cy={fp.y*svgH} r="14" fill="#FFD600" fillOpacity="0.9"/>
                <text x={fp.x*svgW+18} y={fp.y*svgH-10} fontSize="14" fill="#FFD600" fontWeight="700">START</text>
                <circle cx={cp.x*svgW} cy={cp.y*svgH} r="12" fill="#FF6D00" fillOpacity="0.9"/>
                <text x={cp.x*svgW+16} y={cp.y*svgH-10} fontSize="14" fill="#FF6D00" fontWeight="700">REACH</text>
