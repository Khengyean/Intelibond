              <div style={{textAlign:"center",flex:1}}>
                <div style={{fontSize:16,fontWeight:800,color:fm.ring}}>{frailty.level}</div>
                <div style={{fontSize:9,color:T.text3,marginTop:2}}>Frailty class</div>
              </div>
              <div style={{width:1,height:40,background:T.border}}/>
              <div style={{textAlign:"center",flex:1}}>
                <div style={{fontSize:16,fontWeight:800,color:mcsC}}>{mcsTotal}<span style={{fontSize:11,color:T.text3}}>/20</span></div>
                <div style={{fontSize:9,color:T.text3,marginTop:2}}>MCS</div>
              </div>
            </div>
            <div style={{background:T.surface2,borderRadius:10,padding:"10px 14px",fontSize:12,
              color:T.text2,lineHeight:1.6,borderLeft:`3px solid ${mcsC}`,marginBottom:14}}>
              {mcsTotal>=14?"Good mobility. Continue monitoring and preventive exercise."
               :mcsTotal>=8?"Moderate impairment. Consider physiotherapy referral and exercise programme."
               :"Significant impairment. Urgent geriatric review and multidisciplinary care recommended."}
            </div>
            {/* Save & Export row — caregivers only */}
            {isCaregiver&&<div style={{display:"flex",gap:8}}>
              <button onClick={()=>setShowSaveModal(true)}
                style={{flex:2,padding:"12px",borderRadius:11,border:"none",
                  background:selectedPatient?T.primary:"#8BA3BE",color:"#fff",
                  fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                  <path d="M2 10V12H12V10M7 2V9M4 6L7 9L10 6" stroke="#fff" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
                {selectedPatient?"Save to Record":"Select Patient to Save"}
              </button>
              <button onClick={()=>generatePDF({
                  patient: selectedPatient||{full_name:"Unknown Patient"},
                  assessment:{
                    assessed_at:new Date().toISOString(),
                    frailty_level:frailty?.level, frailty_confidence:frailty?.confidence,
                    gait_speed:gaitData?.speed, gait_cadence:gaitData?.cadence,
                    gait_stride_length:gaitData?.stride_length, gait_step_width:gaitData?.step_width,
                    gait_symmetry:gaitData?.symmetry_index, gait_variability:gaitData?.variability,
                    mcs_total:mcsTotal, mcs_scores:taskScores,
                  },
                  caregiverName:profile?.full_name||session?.user?.email
                })}
                style={{flex:1,padding:"12px",borderRadius:11,border:`1px solid ${T.border2}`,
                  background:T.surface,color:T.primary,fontSize:12,fontWeight:700,cursor:"pointer",
                  display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                  <path d="M2 2H9L12 5V12H2V2Z" stroke={T.primary} strokeWidth="1.2" strokeLinejoin="round"/>
                  <path d="M9 2V5H12" stroke={T.primary} strokeWidth="1.2" strokeLinejoin="round"/>
                  <path d="M5 8H9M5 10H7" stroke={T.primary} strokeWidth="1.2" strokeLinecap="round"/>
                </svg>
                PDF
              </button>
            </div>}
          </div>
        )}

        {/* View history shortcut — caregivers only */}
        {isCaregiver&&selectedPatient&&(
          <button onClick={()=>{setHistoryPatient(selectedPatient);setView("history");}}
            style={{width:"100%",padding:"11px",borderRadius:11,border:`1px solid ${T.border}`,
              background:T.surface,color:T.text2,fontSize:12,fontWeight:600,cursor:"pointer",
              display:"flex",alignItems:"center",justifyContent:"center",gap:6,marginBottom:8}}>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <circle cx="7" cy="7" r="5.5" stroke={T.text3} strokeWidth="1.2"/>
              <path d="M7 4V7L9 9" stroke={T.text3} strokeWidth="1.2" strokeLinecap="round"/>
            </svg>
            View {selectedPatient.full_name}'s History
          </button>
        )}
      </div>

      <canvas ref={capCanvas} style={{display:"none"}}/>

      {/* Modals */}
      {isCaregiver&&showAddPatient&&(
        <AddPatientModal
          onAdd={async fields=>{const r=await addPatient(fields);if(r)setSelectedPatient(r);return r;}}
          onClose={()=>setShowAddPatient(false)}
        />
      )}
      {isCaregiver&&showSaveModal&&(
        <SaveAssessmentModal
          patient={selectedPatient}
          frailty={frailty}
          gaitData={gaitData}
          mcsTotal={mcsTotal}
          taskScores={taskScores}
          onSave={handleSaveAssessment}
          onClose={()=>setShowSaveModal(false)}
        />
      )}
      <BottomNav/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AuthGate/>);
</script>
</body>
</html>
